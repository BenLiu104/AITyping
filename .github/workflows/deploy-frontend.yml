name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [semantic-dev, uixi, uiux]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

  # 容許手動 trigger 做測試
  workflow_dispatch:

# Grant GITHUB_TOKEN 權限部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 防止多個 deploy 撞車
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          if [ -z "$VITE_API_BASE_URL" ] || [ -z "$VITE_SENSEVOICE_WS_URL" ]; then
            echo "::error::Missing repo variables VITE_API_BASE_URL / VITE_SENSEVOICE_WS_URL (Settings → Actions → Variables)."
            exit 1
          fi
          npm run build
        env:
          # Public-facing endpoints — injected via repo variables (Settings → Actions → Variables).
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_SENSEVOICE_WS_URL: ${{ vars.VITE_SENSEVOICE_WS_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
